<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro Tailwind</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

<!-- NAVBAR -->
<nav class="bg-gray-900 text-white p-4">

<div class="max-w-6xl mx-auto flex justify-between items-center">

<h1 class="font-bold text-lg">
<i class="fa-solid fa-code"></i> Tailwind
</h1>

<div class="space-x-4">

<a href="index.html" class="hover:text-blue-400">
Formulario Bootstrap
</a>

</div>

</div>

</nav>


<!-- FORMULARIO -->

<div class="flex-grow flex items-center justify-center">

<div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-md">

<h2 class="text-2xl font-semibold text-center mb-2">
Crea tu Cuenta Gratis
</h2>

<p class="text-gray-500 text-center mb-6">
Regístrate en segundos y comienza a explorar
</p>


<form class="space-y-4">

<!-- Nombre -->
<div>
<label class="block text-sm font-medium mb-1">
Nombre Completo
</label>

<div class="relative">

<i class="fa-solid fa-user-astronaut absolute left-3 top-3 text-gray-400"></i>

<input type="text"
placeholder="Ej. Sofía Rodríguez"
class="w-full border rounded-lg py-2 pl-10 pr-3 focus:outline-none focus:ring-2 focus:ring-blue-500">

</div>
</div>


<!-- Email -->
<div>
<label class="block text-sm font-medium mb-1">
Correo Electrónico
</label>

<div class="relative">

<i class="fa-solid fa-at absolute left-3 top-3 text-gray-400"></i>

<input type="email"
placeholder="tuemail@ejemplo.com"
class="w-full border rounded-lg py-2 pl-10 pr-3 focus:outline-none focus:ring-2 focus:ring-blue-500">

</div>
</div>


<!-- Password -->
<div>
<label class="block text-sm font-medium mb-1">
Contraseña
</label>

<div class="relative">

<i class="fa-solid fa-lock absolute left-3 top-3 text-gray-400"></i>

<input type="password"
placeholder="********"
class="w-full border rounded-lg py-2 pl-10 pr-3 focus:outline-none focus:ring-2 focus:ring-blue-500">

</div>
</div>


<!-- Teléfono -->
<div>
<label class="block text-sm font-medium mb-1">
Teléfono
</label>

<div class="relative">

<i class="fa-solid fa-mobile-button absolute left-3 top-3 text-gray-400"></i>

<input type="tel"
placeholder="+52 123 456 7890"
class="w-full border rounded-lg py-2 pl-10 pr-3 focus:outline-none focus:ring-2 focus:ring-blue-500">

</div>
</div>


<!-- País -->
<div>
<label class="block text-sm font-medium mb-1">
País
</label>

<select class="w-full border rounded-lg py-2 px-3 focus:ring-2 focus:ring-blue-500">
<option selected disabled>Seleccionar</option>
<option>México</option>
<option>Colombia</option>
<option>Argentina</option>
<option>España</option>
</select>
</div>


<!-- Términos -->
<div class="flex items-center space-x-2">

<input type="checkbox">

<label class="text-sm">
Acepto los <a href="#" class="text-blue-500">Términos y Condiciones</a>
</label>

</div>


<!-- Botón -->
<button class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">
CREAR CUENTA
</button>


<!-- Redes -->
<div class="text-center text-sm text-gray-500">
O regístrate con
</div>

<div class="flex justify-center space-x-4 text-xl">

<i class="fa-brands fa-google text-blue-500"></i>
<i class="fa-brands fa-facebook text-blue-500"></i>
<i class="fa-brands fa-apple"></i>

</div>

</form>

</div>

</div>


<!-- FOOTER -->

<footer class="bg-gray-900 text-white text-center p-4">

<p>© 2026 Tailwind</p>

<p>Desarrollado por <strong>Maricarmen Suárez</strong></p>

</footer>

</body>
</html>
