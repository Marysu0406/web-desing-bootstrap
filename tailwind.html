<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Formulario Tailwind</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./assets/Img/favicon2.png">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>

        /* Oculta el checkbox */
        #mostrarPassword {
            display: none;
        }

        /* Oculta visualmente la contraseña */
        .password-field {
            -webkit-text-security: disc;
        }

        /* Mostrar contraseña cuando se presiona el ojo */
        #mostrarPassword:checked ~ .password-field {
            -webkit-text-security: none;
        }

    </style>

</head>


<body class="min-h-screen bg-gradient-to-r from-blue-500 to-purple-600 flex flex-col">


    <!-- NAVBAR -->
    <nav class="bg-black/30 backdrop-blur-md text-white">

        <div class="max-w-6xl mx-auto flex justify-between items-center p-4">

            <h1 class="font-bold text-lg">
                <i class="fa-solid fa-code"></i> Tailwind
            </h1>

            <div class="space-x-6">

                <a href="index.html" class="hover:text-yellow-300">
                    Formulario Original
                </a>

            </div>

        </div>

    </nav>


    <!-- FORMULARIO -->
    <div class="flex-grow flex items-center justify-center">

        <div class="bg-white rounded-2xl shadow-2xl p-10 w-full max-w-md">

            <h2 class="text-3xl font-bold text-center mb-2">
                Create Account
            </h2>

            <p class="text-gray-500 text-center mb-8">
                Join QuickForm today
            </p>


            <form class="space-y-4">


                <!-- Nombre -->
                <div class="relative">

                    <i class="fa-solid fa-user absolute left-3 top-3 text-gray-400"></i>

                    <input
                        type="text"
                        placeholder="Nombre completo"
                        class="w-full border rounded-lg px-10 py-2 focus:ring-2 focus:ring-blue-400 outline-none">

                </div>


                <!-- Email -->
                <div class="relative">

                    <i class="fa-solid fa-at absolute left-3 top-3 text-gray-400"></i>

                    <input
                        type="email"
                        placeholder="Correo electrónico"
                        class="w-full border rounded-lg px-10 py-2 focus:ring-2 focus:ring-blue-400 outline-none">

                </div>


                <!-- Password -->
                <div class="relative">

                    <i class="fa-solid fa-lock absolute left-3 top-3 text-gray-400"></i>

                    <!-- Checkbox oculto -->
                    <input type="checkbox" id="mostrarPassword">

                    <!-- Campo contraseña -->
                    <input
                        type="text"
                        placeholder="Contraseña"
                        class="password-field w-full border rounded-lg px-10 py-2 focus:ring-2 focus:ring-blue-400 outline-none">

                    <!-- Icono ojo -->
                    <label
                        for="mostrarPassword"
                        class="absolute right-3 top-3 text-gray-400 cursor-pointer">

                        <i class="fa-solid fa-eye"></i>

                    </label>

                </div>


                <!-- Teléfono -->
                <div class="relative">

                    <i class="fa-solid fa-phone absolute left-3 top-3 text-gray-400"></i>

                    <input
                        type="tel"
                        placeholder="Teléfono"
                        class="w-full border rounded-lg px-10 py-2 focus:ring-2 focus:ring-blue-400 outline-none">

                </div>


                <!-- País -->
                <div class="relative">

                    <i class="fa-solid fa-earth-americas absolute left-3 top-3 text-gray-400"></i>

                    <select
                        class="w-full border rounded-lg px-10 py-2 focus:ring-2 focus:ring-blue-400 outline-none">

                        <option selected disabled>Selecciona tu país</option>
                        <option>México</option>
                        <option>Colombia</option>
                        <option>Argentina</option>
                        <option>España</option>

                    </select>

                </div>


                <!-- Términos -->
                <div class="flex items-center gap-2 text-sm">

                    <input type="checkbox">

                    <span>
                        Acepto los términos y condiciones
                    </span>

                </div>


                <!-- Botón -->
                <button
                    class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">

                    Crear Cuenta

                </button>


                <div class="text-center text-gray-500 text-sm">
                    o regístrate con
                </div>


                <!-- Redes -->
                <div class="flex justify-center gap-6 text-2xl">

                    <i class="fa-brands fa-google text-red-500"></i>
                    <i class="fa-brands fa-facebook text-blue-600"></i>
                    <i class="fa-brands fa-apple"></i>

                </div>

            </form>

        </div>

    </div>


    <!-- FOOTER -->
    <footer class="text-white text-center p-4">

        <p>© 2026 QuickForm</p>

        <p>
            Desarrollado por <strong>Maricarmen Suarez ♡</strong>
        </p>

    </footer>


</body>
</html>
