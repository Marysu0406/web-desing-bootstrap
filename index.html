<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--Favicon-->
    <link rel="icon" type="image/png" href="./assets/img/favicon.png">
    <!-- Bootstrap local -->
    <link rel="stylesheet" href="./assets/css/bootstrap.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="#">
            <i class="fa-solid fa-code"></i> Formulario
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menuNavbar">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link active" href="#">Inicio</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="tailwind.html">Formulario Tailwind</a>
                </li>
                
            </ul>
        </div>

    </div>
</nav>


<!-- CONTENIDO PRINCIPAL -->
<main class="flex-grow-1 d-flex align-items-center justify-content-center">

<div class="container" style="max-width:500px;">

<h2 class="text-center mb-2">Crea tu Cuenta Gratis</h2>
<p class="text-center text-muted mb-4">Regístrate en segundos y comienza a explorar</p>

<form action="#" method="POST">

<!-- Nombre -->
<div class="mb-3">
<label for="nombre" class="form-label">Nombre Completo</label>

<div class="position-relative">
<i class="fa-solid fa-user-astronaut position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>

<input type="text"
class="form-control ps-5"
id="nombre"
placeholder="Ej. Sofía Rodríguez">
</div>
</div>


<!-- Email -->
<div class="mb-3">
<label for="email" class="form-label">Correo Electrónico</label>

<div class="position-relative">
<i class="fa-solid fa-at position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>

<input type="email"
class="form-control ps-5"
id="email"
placeholder="tuemail@ejemplo.com">
</div>
</div>


<!-- Contraseña -->
<div class="mb-3">
<label for="password" class="form-label">Contraseña</label>

<div class="position-relative">
<i class="fa-solid fa-lock position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>

<input type="password"
class="form-control ps-5 pe-5"
id="password"
placeholder="********">

<i class="fa-solid fa-eye-slash position-absolute top-50 end-0 translate-middle-y me-3 text-muted"></i>
</div>
</div>


<!-- Teléfono -->
<div class="mb-3">
<label for="telefono" class="form-label">Teléfono</label>

<div class="position-relative">
<i class="fa-solid fa-mobile-button position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>

<input type="tel"
class="form-control ps-5"
id="telefono"
placeholder="+34 600 123 456">
</div>
</div>


<!-- País -->
<div class="mb-4">
<label for="pais" class="form-label">País</label>

<div class="position-relative">
<i class="fa-solid fa-earth-americas position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>

<select class="form-select ps-5" id="pais">
<option selected disabled>Seleccionar</option>
<option value="1">México</option>
<option value="2">Colombia</option>
<option value="3">Argentina</option>
<option value="4">España</option>
</select>
</div>
</div>


<!-- Términos -->
<div class="mb-3 form-check d-flex justify-content-center align-items-center gap-2">
<input type="checkbox" class="form-check-input mt-0" id="terminos">

<label class="form-check-label" for="terminos">
Acepto los <a href="#">Términos y Condiciones</a>
</label>
</div>


<!-- Botón -->
<button type="submit" class="btn btn-primary w-100 mb-4">
CREAR CUENTA
</button>


<!-- Redes -->
<div class="d-flex justify-content-center align-items-center gap-2">
<span>O regístrate con:</span>

<div class="d-flex gap-3 fs-5">
<i class="fa-brands fa-google text-primary"></i>
<i class="fa-brands fa-facebook-f text-primary"></i>
<i class="fa-brands fa-apple"></i>
</div>
</div>

</form>

</div>

</main>


<!-- FOOTER -->
<footer class="bg-dark text-white text-center py-4">

<div class="container">

<p class="mb-1">©2026</p>

<p class="mb-2">Desarrollado por <strong>Maricarmen Suárez O</strong></p>
</div>

</footer>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
