<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de inscripción</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./assets/Img/favicon.png">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="./assets/css/bootstrap.min.css">

    <!-- FontAwesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand" href="#">
                <i class="fa-solid fa-code"></i> Formulario
            </a>

            <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menuNavbar">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="menuNavbar">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link active" href="#">Inicio</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="tailwind.html">
                            Formulario Tailwind
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>


    <!-- CONTENIDO -->
    <main class="flex-grow-1 d-flex align-items-center justify-content-center">

        <div class="container" style="max-width:500px;">

            <h2 class="text-center mb-2">
                Crea tu Cuenta Gratis
            </h2>

            <p class="text-center text-muted mb-4">
                Regístrate en segundos y comienza a explorar
            </p>

            <form>

                <!-- Nombre -->
                <div class="mb-3">

                    <label class="form-label">Nombre Completo</label>

                    <div class="position-relative">

                        <i class="fa-solid fa-user position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>

                        <input
                            type="text"
                            class="form-control ps-5"
                            placeholder="Ej. Sofía Rodríguez">

                    </div>

                </div>


                <!-- Email -->
                <div class="mb-3">

                    <label class="form-label">Correo Electrónico</label>

                    <div class="position-relative">

                        <i class="fa-solid fa-at position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>

                        <input
                            type="email"
                            class="form-control ps-5"
                            placeholder="tuemail@ejemplo.com">

                    </div>

                </div>


                <!-- Password -->
                <div class="mb-3">

                    <label class="form-label">Contraseña</label>

                    <div class="position-relative">

                        <i class="fa-solid fa-lock position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>

                        <input
                            type="password"
                            id="password"
                            class="form-control ps-5 pe-5"
                            placeholder="********">

                        <i
                            id="togglePassword"
                            class="fa-solid fa-eye position-absolute top-50 end-0 translate-middle-y me-3 text-muted"
                            style="cursor:pointer;">
                        </i>

                    </div>

                </div>


                <!-- Teléfono -->
                <div class="mb-3">

                    <label class="form-label">Teléfono</label>

                    <div class="position-relative">

                        <i class="fa-solid fa-phone position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>

                        <input
                            type="tel"
                            class="form-control ps-5"
                            placeholder="+34 600 123 456">

                    </div>

                </div>


                <!-- País -->
                <div class="mb-4">

                    <label class="form-label">País</label>

                    <div class="position-relative">

                        <i class="fa-solid fa-earth-americas position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>

                        <select class="form-select ps-5">

                            <option selected disabled>
                                Seleccionar
                            </option>

                            <option>México</option>
                            <option>Colombia</option>
                            <option>Argentina</option>
                            <option>España</option>

                        </select>

                    </div>

                </div>


                <!-- Términos -->
                <div class="mb-3 form-check text-center">

                    <input
                        type="checkbox"
                        class="form-check-input">

                    <label class="form-check-label">
                        Acepto los términos y condiciones
                    </label>

                </div>


                <!-- Botón -->
                <button class="btn btn-primary w-100 mb-4">
                    CREAR CUENTA
                </button>


                <!-- Redes -->
                <div class="text-center">

                    <span>O regístrate con</span>

                    <div class="d-flex justify-content-center gap-3 mt-2 fs-5">

                        <i class="fa-brands fa-google text-danger"></i>
                        <i class="fa-brands fa-facebook text-primary"></i>
                        <i class="fa-brands fa-apple"></i>

                    </div>

                </div>

            </form>

        </div>

    </main>


    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-4">

        <p>©2026</p>
        <p>Desarrollado por <strong>Maricarmen Suárez ♡</strong></p>

    </footer>


    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


    <!-- Mostrar contraseña -->
    <script>

        const togglePassword = document.getElementById("togglePassword");
        const password = document.getElementById("password");

        togglePassword.addEventListener("click", function () {

            const type = password.type === "password" ? "text" : "password";
            password.type = type;

        });

    </script>

</body>
</html>
